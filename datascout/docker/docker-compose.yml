version: "3.9"

services:
  datascout-api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - "8000:8000"
    environment:
      - ENVIRONMENT=development
      - LOG_LEVEL=INFO
      - DATABASE_URL=sqlite+aiosqlite:///./datascout.db
      - API_KEY=dev-api-key
    env_file:
      - ../.env
    volumes:
      - datascout_data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

volumes:
  datascout_data:
